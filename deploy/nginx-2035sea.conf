# ============================================================
# nearapp.xyz — 主域名配置
# 2035大海战 + 后续所有 web apps
# ============================================================

# --- HTTP → HTTPS 跳转 ---
server {
    if ($host = www.nearapp.xyz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = nearapp.xyz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name nearapp.xyz www.nearapp.xyz;

    # Let's Encrypt ACME 验证
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/2035sea;
    }

    # 其他所有请求强制跳 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }




}

# --- HTTPS 主站 ---
server {
    listen 443 ssl;
    http2 on;
    server_name nearapp.xyz www.nearapp.xyz;

    # Let's Encrypt 证书 (certbot 自动管理)
    ssl_certificate /etc/letsencrypt/live/nearapp.xyz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/nearapp.xyz/privkey.pem; # managed by Certbot

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    root /var/www/2035sea;
    index index.html;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # WebSocket 代理 → game-engine :8080
    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # V5.0 WebSocket 代理 → :8081
    location /v5ws {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # V5 静态文件
    location /v5/ {
        alias /var/www/2035sea/v5/;
        index index-v5.0.html;
        try_files $uri $uri/ =404;
    }

    # 主站静态文件
    location / {
        try_files $uri $uri/ =404;
    }


}
